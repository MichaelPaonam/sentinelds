name: Discord Notifications

on:
  push:
    branches:
      - main
      - phase-one
      - phase-two
      - phase-three

  pull_request:
    types:
      - opened
      - closed

  pull_request_review:
    types:
      - submitted

  issue_comment:
    types:
      - created

  pull_request_review_comment:
    types:
      - created

  issues:
    types:
      - closed

  milestone:
    types:
      - closed

  workflow_run:
    types:
      - completed
    workflows:
      - "*"

permissions:
  contents: read
  security-events: read

jobs:
  notify:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Build message
        id: message
        env:
          EVENT: ${{ github.event_name }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          COMPARE_URL: ${{ github.event.compare }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          MILESTONE_TITLE: ${{ github.event.milestone.title }}
          MILESTONE_URL: ${{ github.event.milestone.html_url }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          ALERT_URL: ${{ github.event.alert.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FULL_NAME=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/users/$ACTOR" | jq -r '.name // empty')
          ACTOR="${FULL_NAME:-$ACTOR}"
          case "$EVENT" in
            push)
              MSG="🚀 Push to main by $ACTOR"
              URL="$COMPARE_URL"
              ;;
            pull_request)
              MSG="🔀 Pull Request: $PR_TITLE"
              URL="$PR_URL"
              ;;
            pull_request_review)
              MSG="👀 PR Review by $ACTOR"
              URL="$REVIEW_URL"
              ;;
            issue_comment)
              if [ "$IS_PR_COMMENT" = "true" ]; then
                MSG="💬 Comment on PR by $ACTOR"
              else
                MSG="💬 Comment on Issue by $ACTOR"
              fi
              URL="$COMMENT_URL"
              ;;
            pull_request_review_comment)
              MSG="💭 Review Comment by $ACTOR"
              URL="$COMMENT_URL"
              ;;
            issues)
              MSG="🐛 Issue closed by $ACTOR"
              URL="$ISSUE_URL"
              ;;
            milestone)
              MSG="🎯 Milestone closed: $MILESTONE_TITLE"
              URL="$MILESTONE_URL"
              ;;
            workflow_run)
              MSG="🚨 Workflow Failed: $WORKFLOW_NAME ($WORKFLOW_CONCLUSION)"
              URL="$WORKFLOW_URL"
              ;;
            code_scanning_alert)
              MSG="🚨 Code Scanning Alert"
              URL="$ALERT_URL"
              ;;
            secret_scanning_alert)
              MSG="🔐 Secret Scanning Alert"
              URL="$ALERT_URL"
              ;;
          esac

          echo "msg=$MSG" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Send Discord Notification
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645
        with:
          webhook-url: ${{ env.DISCORD_WEBHOOK }}
          embed-title: ${{ steps.message.outputs.msg }}
          embed-description: "Repository: ${{ github.repository }}"
          embed-url: ${{ steps.message.outputs.url }}
          embed-color: "16711680"
