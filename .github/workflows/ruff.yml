name: Ruff

on:
  push:
    branches:
      - main
      - phase-one
      - phase-two
      - phase-three
  pull_request:
    branches:
      - main
      - phase-one
      - phase-two
      - phase-three

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync
    - name: Ruff linting
      uses: astral-sh/ruff-action@v4.0.0 
      with: 
        args: check .  
    - name: Ruff formatting
      uses: astral-sh/ruff-action@v4.0.0 
      with: 
        args: format . --check
